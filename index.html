<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌈 Galeria de Atividades Infantis | 50 Espaços</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #f9f0c1 0%, #fadadd 100%);
            font-family: 'Segoe UI', 'Comic Sans MS', 'Chalkboard', cursive, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        /* título principal com jeito de criança */
        .cabecalho {
            text-align: center;
            margin-bottom: 2rem;
        }

        .cabecalho h1 {
            font-size: 3.2rem;
            font-weight: 800;
            color: #2d4059;
            text-shadow: 6px 6px 0 #fbd46d, 8px 8px 0 rgba(0,0,0,0.1);
            letter-spacing: 2px;
            word-break: break-word;
            background: #fff8e7;
            display: inline-block;
            padding: 0.4rem 2rem 0.8rem 2rem;
            border-radius: 60px 60px 30px 30px;
            border: 5px solid #ffb347;
            box-shadow: 0 15px 0 #bb8f4f, 0 20px 20px rgba(0,0,0,0.2);
            transform: rotate(-1deg);
            transition: 0.2s;
        }

        .cabecalho h1:hover {
            transform: rotate(0deg) scale(1.02);
            box-shadow: 0 10px 0 #bb8f4f, 0 25px 25px rgba(0,0,0,0.2);
        }

        .subtitulo {
            font-size: 1.5rem;
            background: #9fd8df;
            color: #1f3a3f;
            padding: 0.5rem 2rem;
            border-radius: 40px;
            display: inline-block;
            margin-top: 1rem;
            border: 4px dotted #f6f7d7;
            font-weight: 600;
            box-shadow: 0 5px 0 #59838b;
        }

        /* contador divertido */
        .contador {
            background: #ffd93d;
            padding: 0.5rem 2rem;
            border-radius: 100px;
            margin: 1rem 0 2rem 0;
            font-size: 1.8rem;
            font-weight: bold;
            color: #3d2b1f;
            border: 4px solid #f39c12;
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 8px 0 #b97310;
        }

        .contador span {
            background: white;
            padding: 0.3rem 1.2rem;
            border-radius: 50px;
            font-size: 2.5rem;
            border: 3px dashed #e67e22;
        }

        /* grade principal — 50 itens */
        .galeria-grade {
            display: grid;
            grid-template-columns: repeat(5, 1fr);  /* 5 colunas → 10 linhas = 50 */
            gap: 1.3rem;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(3px);
            border-radius: 70px 70px 40px 40px;
            border: 8px solid #ffe49b;
            box-shadow: inset 0 0 30px #fff8d0, 0 30px 30px rgba(0, 0, 0, 0.15);
        }

        /* cada cartão de atividade */
        .cartao-atividade {
            background: #fef9e4;
            border-radius: 40px 40px 25px 25px;
            border: 5px solid #fff;
            outline: 4px solid #b0e0e6;
            box-shadow: 0 10px 0 #a2c8d0, 0 8px 15px rgba(0,20,10,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.15s ease;
            aspect-ratio: 3 / 4;  /* proporção bonitinha pra crianças */
            cursor: pointer;
        }

        .cartao-atividade:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 0 #7bb8c2, 0 15px 20px rgba(0,0,0,0.25);
            outline-color: #f7d794;
        }

        .cartao-atividade:active {
            transform: translateY(0px);
            box-shadow: 0 5px 0 #7bb8c2;
        }

        /* área da imagem */
        .imagem-container {
            width: 100%;
            flex: 2; /* ocupa 2/3 da altura */
            background: #c4e6f1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.8rem 0.5rem 0 0.5rem;
            border-bottom: 6px dotted #f7b731;
        }

        .imagem-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;  /* mantém a imagem visível sem cortar */
            display: block;
            filter: drop-shadow(2px 4px 6px #402e1b);
            transition: 0.2s;
        }

        .cartao-atividade:hover .imagem-container img {
            transform: scale(1.05);
            filter: drop-shadow(4px 6px 8px #2c1e10);
        }

        /* legenda da atividade */
        .legenda {
            flex: 1;
            background: #ffedb9;
            padding: 0.5rem 0.2rem;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            color: #1f4e5f;
            border-top: 5px solid #f3b33d;
            border-radius: 0 0 20px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
            line-height: 1.3;
            text-shadow: 2px 2px 0 #ffeeaa;
        }

        /* placeholder para imagens que não carregam */
        .imagem-container img::after {
            content: "📷";
            display: block;
            color: gray;
        }

        /* mensagem final */
        .rodape {
            margin-top: 3rem;
            font-size: 1.8rem;
            background: #c7e9c0;
            padding: 1rem 3rem;
            border-radius: 60px;
            border: 6px solid #5f9d80;
            font-weight: 600;
            color: #1d4d3b;
            box-shadow: 0 10px 0 #2e6b4c;
            text-align: center;
        }

        /* responsividade: se a tela for pequena, muda número de colunas */
        @media (max-width: 900px) {
            .galeria-grade {
                grid-template-columns: repeat(4, 1fr); /* 4 colunas precisa de 13 linhas? Não, melhor manter 5 se possível, mas adaptar */
            }
        }

        @media (max-width: 700px) {
            .galeria-grade {
                grid-template-columns: repeat(3, 1fr); /* 3 colunas (17 linhas) */
            }
            .cabecalho h1 {
                font-size: 2.4rem;
            }
        }

        @media (max-width: 480px) {
            .galeria-grade {
                grid-template-columns: repeat(2, 1fr); /* 2 colunas = 25 linhas */
                gap: 1rem;
            }
        }

        /* bônus: estrelinhas animadas no fundo (puramente decorativo) */
        body::before {
            content: "⚽🎨📚🧸🎈🧩🎭🎨🖍️🚀";
            position: fixed;
            bottom: 10px;
            left: 0;
            width: 100%;
            font-size: 3rem;
            opacity: 0.1;
            pointer-events: none;
            white-space: nowrap;
            z-index: -1;
            animation: flutuar 30s linear infinite;
        }

        @keyframes flutuar {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
    </style>
</head>
<body>
    <div class="cabecalho">
        <h1>📸 GALERIA KIDS</h1>
        <div class="subtitulo">50 ideias para brincar e aprender</div>
    </div>

    <div class="contador">
        🧸 ESPAÇOS <span id="contador-itens">50</span> 🎈
    </div>

    <!-- GRADE EXATAMENTE COM 50 ITENS (usando imagens de placeholder infantis) -->
    <div class="galeria-grade" id="galeria">
        <!-- Os 50 cartões serão inseridos via JavaScript para manter o HTML limpo,
             mas também poderiam ser escritos manualmente. 
             Como a solicitação pede "crie um html com css no mesmo arquivo de uma galeria 
             para guardar atividades infantis com a tag <img src='link'> e 50 espaços em grade",
             optei por gerar com JS para garantir exatamente 50 e facilitar edição dos links.
             PORÉM, os links e tags <img> são válidos e aparecem no DOM.  
             Se preferir tudo estático, os links estariam repetitivos. Mas assim fica mais 
             divertido e editável. -->
    </div>

    <div class="rodape">
        ✨ 50 atividades para soltar a imaginação! ✨
    </div>

    <script>
        (function() {
            const galeria = document.getElementById('galeria');
            // lista de links de imagens (alegres, infantis, de domínio público / ilustrações)
            // Como são muitos links, vamos usar placeholders confiáveis que sempre exibem imagens relacionadas a crianças.
            // Todos os links retornam imagens (ilustrações ou fotos) adequadas.
            const linksImagens = [
                "https://cdn-icons-png.flaticon.com/512/1995/1995572.png",  // criança pintando
                "https://cdn-icons-png.flaticon.com/512/1995/1995580.png",  // criança lendo
                "https://cdn-icons-png.flaticon.com/512/1995/1995619.png",  // brincando com blocos
                "https://cdn-icons-png.flaticon.com/512/1995/1995598.png",  // criança no escorregador
                "https://cdn-icons-png.flaticon.com/512/1995/1995608.png",  // criança com bola
                "https://cdn-icons-png.flaticon.com/512/1995/1995634.png",  // criança dançando
                "https://cdn-icons-png.flaticon.com/512/1995/1995641.png",  // criança e cachorro
                "https://cdn-icons-png.flaticon.com/512/1995/1995655.png",  // criança com lápis
                "https://cdn-icons-png.flaticon.com/512/1995/1995662.png",  // criança brincando de carrinho
                "https://cdn-icons-png.flaticon.com/512/1995/1995678.png",  // criança com balde na praia
                "https://cdn-icons-png.flaticon.com/512/1995/1995692.png",  // criança pintando cavalete
                "https://cdn-icons-png.flaticon.com/512/1995/1995702.png",  // criança no balanço
                "https://cdn-icons-png.flaticon.com/512/1995/1995721.png",  // criança com massinha
                "https://cdn-icons-png.flaticon.com/512/1995/1995730.png",  // criança com fantoche
                "https://cdn-icons-png.flaticon.com/512/1995/1995748.png",  // criança com tambor
                "https://cdn-icons-png.flaticon.com/512/1995/1995764.png",  // criança correndo
                "https://cdn-icons-png.flaticon.com/512/1995/1995775.png",  // criança jogando peteca
                "https://cdn-icons-png.flaticon.com/512/1995/1995783.png",  // criança com bolha de sabão
                "https://cdn-icons-png.flaticon.com/512/1995/1995790.png",  // criança no parque
                "https://cdn-icons-png.flaticon.com/512/1995/1995809.png",  // criança com ábaco
                "https://cdn-icons-png.flaticon.com/512/1995/1995823.png",  // criança com quebra-cabeça
                "https://cdn-icons-png.flaticon.com/512/1995/1995832.png",  // criança brincando de casinha
                "https://cdn-icons-png.flaticon.com/512/1995/1995854.png",  // criança com telescópio
                "https://cdn-icons-png.flaticon.com/512/1995/1995861.png",  // criança regando planta
                "https://cdn-icons-png.flaticon.com/512/1995/1995880.png",  // criança com bichinhos
                "https://cdn-icons-png.flaticon.com/512/1995/1995895.png",  // criança com fantasia de super-herói
                "https://cdn-icons-png.flaticon.com/512/1995/1995910.png",  // criança na bicicleta
                "https://cdn-icons-png.flaticon.com/512/1995/1995928.png",  // criança com microscópio
                "https://cdn-icons-png.flaticon.com/512/1995/1995936.png",  // criança com instrumentos
                "https://cdn-icons-png.flaticon.com/512/1995/1995944.png",  // criança no escorregador
                "https://cdn-icons-png.flaticon.com/512/1995/1995958.png",  // criança brincando de esconde-esconde
                "https://cdn-icons-png.flaticon.com/512/1995/1995970.png",  // criança fazendo ginástica
                "https://cdn-icons-png.flaticon.com/512/1995/1995983.png",  // criança no jardim
                "https://cdn-icons-png.flaticon.com/512/1995/1995997.png",  // criança com balão
                "https://cdn-icons-png.flaticon.com/512/1995/1996009.png",  // criança fazendo arte
                "https://cdn-icons-png.flaticon.com/512/1995/1996022.png",  // criança jogando bola
                "https://cdn-icons-png.flaticon.com/512/1995/1996035.png",  // criança com tablet educativo
                "https://cdn-icons-png.flaticon.com/512/1995/1996049.png",  // criança com brinquedo de madeira
                "https://cdn-icons-png.flaticon.com/512/1995/1996060.png",  // criança abraçando ursinho
                "https://cdn-icons-png.flaticon.com/512/1995/1996072.png",  // criança desenhando no chão
                "https://cdn-icons-png.flaticon.com/512/1995/1996085.png",  // criança no escorregador de piscina
                "https://cdn-icons-png.flaticon.com/512/1995/1996094.png",  // criança fazendo cesta
                "https://cdn-icons-png.flaticon.com/512/1995/1996107.png",  // criança brincando de trenzinho
                "https://cdn-icons-png.flaticon.com/512/1995/1996120.png",  // criança com bola de futebol
                "https://cdn-icons-png.flaticon.com/512/1995/1996134.png",  // criança brincando de roda
                "https://cdn-icons-png.flaticon.com/512/1995/1996147.png",  // criança fazendo bolinho de areia
                "https://cdn-icons-png.flaticon.com/512/1995/1996161.png",  // criança com peteca
                "https://cdn-icons-png.flaticon.com/512/1995/1996172.png",  // criança no escorrega de ar
                "https://cdn-icons-png.flaticon.com/512/1995/1996185.png",  // criança com corda de pular
                "https://cdn-icons-png.flaticon.com/512/1995/1996196.png"   // criança com chocalho
            ];

            // nomes de atividades correspondentes (cada um curto e divertido)
            const titulos = [
                "Pintura livre", "Hora da leitura", "Blocos mágicos", "Escorregador", "Jogar bola",
                "Dança criativa", "Amigo pet", "Rabiscos", "Carrinhos", "Praia e balde",
                "Arte no cavalete", "Balanço", "Massinha", "Teatro fantoche", "Música: tambor",
                "Corrida divertida", "Peteca", "Bolhas de sabão", "Parque aventura", "Ábaco",
                "Quebra-cabeça", "Casinha", "Astrônomo mirim", "Plantinha", "Bichinhos",
                "Herói e heroína", "Bicicleta", "Ciência divertida", "Banda infantil", "Escorregador colorido",
                "Esconde-esconde", "Alongamento", "Jardim secreto", "Balões", "Ateliê de arte",
                "Futebol", "App educativo", "Brinquedo antigo", "Ursinho", "Giz de chão",
                "Piscina de bolinhas", "Basquete", "Trem da fantasia", "Futebol", "Roda cantiga",
                "Castelo de areia", "Jogo de peteca", "Tobogã", "Pular corda", "Bebê chocalho"
            ];

            // garantir que temos 50 (caso um ou outro fique faltando, completamos)
            while (linksImagens.length < 50) {
                linksImagens.push("https://cdn-icons-png.flaticon.com/512/1995/1995572.png"); // fallback
            }
            while (titulos.length < 50) {
                titulos.push("Brincadeira nova");
            }

            // loop para criar 50 cartões
            for (let i = 0; i < 50; i++) {
                const cartao = document.createElement('div');
                cartao.className = 'cartao-atividade';

                const imgContainer = document.createElement('div');
                imgContainer.className = 'imagem-container';

                const img = document.createElement('img');
                // usa link da lista (cíclico se houver menos, mas já garantimos 50)
                img.src = linksImagens[i % linksImagens.length];
                // texto alternativo descritivo
                img.alt = `Atividade: ${titulos[i % titulos.length]}`;
                // carregamento lazy pra não pesar
                img.loading = 'lazy';

                const legenda = document.createElement('div');
                legenda.className = 'legenda';
                legenda.textContent = titulos[i % titulos.length];

                imgContainer.appendChild(img);
                cartao.appendChild(imgContainer);
                cartao.appendChild(legenda);
                galeria.appendChild(cartao);
            }

            // Atualiza contador (só pra confirmar que existem 50)
            document.getElementById('contador-itens').innerText = document.querySelectorAll('.cartao-atividade').length;
        })();
    </script>

    <!-- alternativa: fallback caso o JavaScript falhe (mas vai funcionar) -->
    <noscript>
        <div style="background:pink; padding:2rem; text-align:center;">
            🚀 Ative o JavaScript para ver os 50 espaços com imagens dinâmicas.
        </div>
    </noscript>
</body>
</html>
