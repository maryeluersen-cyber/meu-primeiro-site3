<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Atividades Infantis - 50 Ideias Divertidas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 20px;
            background: white;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 2.5rem;
            color: #667eea;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        h1 span {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #666;
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .counter {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 15px;
        }

        /* Grid de imagens */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        /* Card de atividade */
        .activity-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .activity-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .image-container {
            position: relative;
            overflow: hidden;
            background: #f0f0f0;
            height: 250px;
        }

        .activity-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .activity-card:hover img {
            transform: scale(1.05);
        }

        .activity-info {
            padding: 15px;
            background: white;
        }

        .activity-title {
            font-weight: bold;
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 8px;
        }

        .activity-description {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.4;
        }

        .badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            margin-top: 8px;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px;
            background: white;
            border-radius: 20px;
            margin-top: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .footer p {
            color: #666;
        }

        /* Modal para imagem ampliada */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            cursor: pointer;
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1001;
        }

        .close-modal:hover {
            color: #bbb;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 15px;
            }
            
            .image-container {
                height: 200px;
            }
        }

        @media (max-width: 480px) {
            .gallery {
                grid-template-columns: 1fr;
            }
        }

        /* Loading effect */
        .loading {
            position: relative;
        }

        .loading::before {
            content: "📸";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 30px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">

            <p class="subtitle">Ideias criativas e divertidas para crianças de todas as idades!</p>

            { titulo: "Massagem com bolinhas", descricao: "Relaxamento sensorial", imagem: "https://picsum.photos/id/440/400/300" },
            { titulo: "Stop (Adedonha)", descricao: "Conhecimento e rapidez", imagem: "https://picsum.photos/id/450/400/300" },
            { titulo: "Pintura com gelo", descricao: "Experiência sensorial", imagem: "https://picsum.photos/id/460/400/300" },
            { titulo: "Jogo das cadeiras", descricao: "Agilidade e música", imagem: "https://picsum.photos/id/470/400/300" },
            { titulo: "Teatro de sombras", descricao: "Arte com luz e sombra", imagem: "https://picsum.photos/id/480/400/300" },
            { titulo: "Cama elástica", descricao: "Exercício e alegria", imagem: "https://picsum.photos/id/490/400/300" },
            { titulo: "Festa do pijama", descricao: "Socialização e diversão", imagem: "https://picsum.photos/id/500/400/300" }
        ];

        const gallery = document.getElementById('gallery');
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');
        const closeModal = document.querySelector('.close-modal');

        // Gerar os cards das atividades
        function gerarGaleria() {
            atividades.forEach((atividade, index) => {
                const card = document.createElement('div');
                card.className = 'activity-card';
                card.setAttribute('data-index', index);
                
                card.innerHTML = `
                    <div class="image-container">
                        <img src="${atividade.imagem}" alt="${atividade.titulo}" loading="lazy">
                    </div>
                    <div class="activity-info">
                        <div class="activity-title">${(index + 1)}. ${atividade.titulo}</div>
                        <div class="activity-description">${atividade.descricao}</div>
                        <span class="badge">⭐ Atividade ${index + 1}/50</span>
                    </div>
                `;
                
                // Adicionar evento de clique para abrir modal
                card.addEventListener('click', () => {
                    modal.style.display = 'block';
                    modalImg.src = atividade.imagem;
                    modalImg.alt = atividade.titulo;
                });
                
                gallery.appendChild(card);
            });
        }

        // Modal events
        closeModal.onclick = function() {
            modal.style.display = 'none';
        }

        modal.onclick = function(event) {
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }

        // Tecla ESC para fechar modal
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape' && modal.style.display === 'block') {
                modal.style.display = 'none';
            }
        });

        // Inicializar a galeria
        gerarGaleria();

        // Adicionar loading effect nas imagens
        const images = document.querySelectorAll('.image-container img');
        images.forEach(img => {
            img.addEventListener('load', function() {
                this.parentElement.classList.remove('loading');
            });
            img.addEventListener('error', function() {
                this.src = 'https://picsum.photos/id/404/400/300';
                this.alt = 'Imagem não disponível';
            });
        });
    </script>
</body>
</html>
